<!DOCTYPE html>
<html>
<head>
    <title>Sort 3 Numbers</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f2f2f2;
        }

        input {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <h2>Sort 3 Numbers 🔢</h2>

    <input type="number" id="num1" placeholder="Enter first number"><br>
    <input type="number" id="num2" placeholder="Enter second number"><br>
    <input type="number" id="num3" placeholder="Enter third number"><br><br>

    <button onclick="sortNumbers()">Sort Numbers</button>

    <script>
        function sortNumbers() {
            
            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);
            let c = parseFloat(document.getElementById("num3").value);
            let arr = [a, b, c];
            arr.sort(function(x, y) {
                return x - y; 
            });

            
            alert("Sorted Numbers: " + arr.join(", "));
        }
    </script>

</body>
</html>
