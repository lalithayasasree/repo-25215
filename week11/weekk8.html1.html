<body>
<script>
    function prime(){
        let a = parseInt(prompt("Enter a number"));

if (a <= 1) {
    document.write("Not a prime number");

else if (a == 2 || a == 3 || a == 5 || a == 7) {

<!DOCTYPE html>
<html>
    <script>
        function fact(){
            let a=parseInt(prompt("enter a number"));
        let fact=1;
        if(a<0){
            document.write("factorial is not possible")
        }else{
            for(let i=1;i<=a;i++){
                fact=fact*i;

            }
            document.write("the factorial of" + a + "is" + fact);
        }


        }
        fact()
        
    </script>
</html>
<!DOCTYPE html>
<html>
    <body>
        <script>
            function arm(){
                let a=parseInt(prompt("enter a number"));
                let temp=a;
                let sum=0;
                let digits=a.toString().length;
                while(temp>0){
                    let digit=temp%10;
                    sum+=digit**digits;
                    temp=Math.floor(temp/10);
                }
                if(sum==a){
                    document.write(a+"is a armstrong number")
                }else{
                    document.write(a+"is not a armstrong number")
                }
            }
            arm()

        </script>
    </body>
